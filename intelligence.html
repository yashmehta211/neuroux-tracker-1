<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroUX · Founder Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f7f3;--bg2:#ffffff;--bg3:#f1f0ea;--bg4:#e8e7df;
  --line:#e2e0d6;--line2:#d0cec2;
  --ink:#16161a;--ink2:#34343c;--soft:#64646f;--muted:#96969f;--dim:#c0c0c8;
  --gold:#a87020;--gold2:#cc9038;--goldbg:rgba(168,112,32,0.07);--goldbd:rgba(168,112,32,0.2);
  --red:#b83030;--redbg:rgba(184,48,48,0.06);--redbd:rgba(184,48,48,0.18);
  --grn:#1a7248;--grnbg:rgba(26,114,72,0.06);--grnbd:rgba(26,114,72,0.18);
  --blu:#1848a8;--blubg:rgba(24,72,168,0.06);--blubd:rgba(24,72,168,0.18);
  --amb:#a05808;--ambbg:rgba(160,88,8,0.06);--ambbd:rgba(160,88,8,0.18);
  --sh1:0 1px 4px rgba(22,22,26,0.06),0 1px 2px rgba(22,22,26,0.04);
  --sh2:0 4px 24px rgba(22,22,26,0.09);--sh3:0 20px 64px rgba(22,22,26,0.13);
}
html,body{min-height:100%;}
body{background:var(--bg);color:var(--ink);font-family:'Geist',sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--line);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:50;box-shadow:var(--sh1);}
.hdr-l{display:flex;align-items:center;gap:14px;}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:grid;place-items:center;flex-shrink:0;}
.logo-i{width:14px;height:14px;background:#fff;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
.logo-text{display:flex;flex-direction:column;gap:1px;}
.logo-name{font-weight:700;font-size:14px;letter-spacing:0.05em;color:var(--ink);}
.logo-sub{font-family:'Geist Mono',monospace;font-size:8.5px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.hdr-div{width:1px;height:22px;background:var(--line);}
.hdr-title{font-family:'Instrument Serif',serif;font-size:18px;color:var(--soft);font-style:italic;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.hdr-ts{font-family:'Geist Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.05em;}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:7px 15px;font-family:'Geist',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;width:auto;}
.btn-dark{background:var(--ink);color:#fff;} .btn-dark:hover{background:var(--ink2);}
.btn-dark.loading{background:var(--gold);width:auto;}
.btn-light{background:var(--bg3);border:1px solid var(--line);color:var(--soft);} .btn-light:hover{background:var(--bg4);color:var(--ink);}
.btn-gold{background:var(--gold);color:#fff;border:none;} .btn-gold:hover{background:var(--gold2);}

/* ── MODALS ── */
.mo{display:none;position:fixed;inset:0;background:rgba(22,22,26,0.45);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.mo.open{display:flex;}
.md{background:var(--bg2);border:1px solid var(--line);border-radius:14px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:var(--sh3);animation:mi 0.2s ease both;}
.md-h{padding:20px 24px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.md-t{font-family:'Instrument Serif',serif;font-size:19px;color:var(--ink);}
.mcls{background:var(--bg3);border:1px solid var(--line);border-radius:6px;font-size:14px;cursor:pointer;color:var(--muted);padding:3px 8px;transition:all 0.12s;}
.mcls:hover{background:var(--bg4);color:var(--ink);}
.mb{padding:18px 24px 24px;}
.ff{margin-bottom:12px;}
.ff label{display:block;font-family:'Geist Mono',monospace;font-size:8.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.ff input{width:100%;background:var(--bg3);border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;font-family:'Geist Mono',monospace;font-size:12px;color:var(--ink);outline:none;transition:all 0.15s;}
.ff input:focus{border-color:var(--gold);background:var(--bg2);box-shadow:0 0 0 3px var(--goldbg);}
.mfa{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);}
.fpri{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:9px 22px;font-family:'Geist',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;} .fpri:hover{background:var(--gold2);}
.fcan{background:none;border:1.5px solid var(--line);color:var(--soft);border-radius:8px;padding:9px 16px;font-family:'Geist',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;} .fcan:hover{background:var(--bg3);}

/* ── PAGE ── */
.wrap{max-width:1280px;margin:0 auto;padding:32px 40px 72px;}

/* ── AI BRIEF ── */
.brief{background:linear-gradient(135deg,#fffbf2 0%,#fdf6e3 60%,#fef9ec 100%);border:1.5px solid var(--goldbd);border-radius:14px;padding:28px 32px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:var(--sh2);}
.brief::after{content:'';position:absolute;top:-40px;right:-40px;width:220px;height:220px;border-radius:50%;background:rgba(168,112,32,0.06);}
.brief::before{content:'';position:absolute;bottom:-50px;left:80px;width:160px;height:160px;border-radius:50%;background:rgba(168,112,32,0.04);}
.brief-label{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.brief-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s ease-in-out infinite;}
.brief-text{font-family:'Instrument Serif',serif;font-size:19px;line-height:1.68;color:var(--ink);position:relative;z-index:1;max-width:940px;}
.brief-text.loading{color:var(--muted);font-style:italic;font-size:15px;}
.brief-meta{margin-top:14px;font-family:'Geist Mono',monospace;font-size:9.5px;color:var(--muted);letter-spacing:0.05em;position:relative;z-index:1;display:flex;align-items:center;gap:0;}
.brief-regen{background:none;border:1px solid var(--goldbd);border-radius:6px;padding:4px 12px;font-family:'Geist',sans-serif;font-size:11px;color:var(--gold);cursor:pointer;transition:all 0.15s;margin-left:12px;}
.brief-regen:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
/* ── INSIGHT CARDS ── */
.insights{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
.insight{background:var(--bg2);border:1px solid var(--line);border-left:3px solid;border-radius:10px;padding:14px 16px;box-shadow:var(--sh1);display:flex;gap:10px;transition:all 0.15s;cursor:pointer;}
.insight:hover{box-shadow:var(--sh2);transform:translateY(-1px);}
.insight.active-ins{box-shadow:var(--sh2);transform:translateY(-1px);}
.insight.gold{border-left-color:var(--gold);} .insight.gold.active-ins{background:var(--goldbg);}
.insight.grn{border-left-color:var(--grn);} .insight.grn.active-ins{background:var(--grnbg);}
.insight.red{border-left-color:var(--red);} .insight.red.active-ins{background:var(--redbg);}
.insight.blu{border-left-color:var(--blu);} .insight.blu.active-ins{background:var(--blubg);}
.insight.amb{border-left-color:var(--amb);} .insight.amb.active-ins{background:var(--ambbg);}
.ins-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.ins-ttl{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.4;}
.ins-txt{font-size:11px;color:var(--soft);line-height:1.6;}
.ins-hint{font-size:9.5px;color:var(--dim);margin-top:5px;font-family:'Geist Mono',monospace;letter-spacing:0.04em;}

/* ── REVENUE HERO ── */
.rev-hero{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.rh-card{border-radius:12px;padding:24px 26px;position:relative;overflow:hidden;transition:all 0.18s;cursor:default;}
.rh-card:hover{transform:translateY(-2px);box-shadow:var(--sh2);}
.rh-card.won{background:var(--grn);} .rh-card.lost{background:var(--red);} .rh-card.pipe{background:var(--bg2);border:1px solid var(--line);box-shadow:var(--sh1);}
.rh-card::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.08);}
.rh-lbl{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px;}
.rh-card.won .rh-lbl,.rh-card.lost .rh-lbl{color:rgba(255,255,255,0.6);}
.rh-card.pipe .rh-lbl{color:var(--muted);}
.rh-val{font-family:'Instrument Serif',serif;font-size:48px;line-height:1;letter-spacing:-0.02em;margin-bottom:6px;}
.rh-card.won .rh-val,.rh-card.lost .rh-val{color:#fff;}
.rh-card.pipe .rh-val{color:var(--blu);}
.rh-sub{font-size:12px;}
.rh-card.won .rh-sub,.rh-card.lost .rh-sub{color:rgba(255,255,255,0.65);}
.rh-card.pipe .rh-sub{color:var(--muted);}
.rh-rate{font-family:'Geist Mono',monospace;font-size:13px;font-weight:500;margin-top:8px;padding:4px 10px;border-radius:20px;display:inline-block;}
.rh-card.won .rh-rate{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);}
.rh-card.lost .rh-rate{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);}
.rh-card.pipe .rh-rate{background:var(--blubg);color:var(--blu);border:1px solid var(--blubd);}

/* ── SECONDARY STATS ── */
.sec-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
.ss{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:16px 18px;box-shadow:var(--sh1);}
.ss-lbl{font-family:'Geist Mono',monospace;font-size:8.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.ss-val{font-family:'Instrument Serif',serif;font-size:26px;color:var(--ink);line-height:1;margin-bottom:3px;}
.ss-sub{font-size:11px;color:var(--muted);}

/* ── SECTION ── */
.sh{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;}
.sh-t{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);}
.sh-s{font-size:12px;color:var(--muted);}
.sh-line{flex:1;height:1px;background:var(--line);}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;}
.g13{display:grid;grid-template-columns:1fr 1.8fr;gap:16px;margin-bottom:24px;}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:22px 24px;box-shadow:var(--sh1);}
.ct{font-family:'Geist Mono',monospace;font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.ct span{color:var(--dim);}

/* ── WHERE MONEY IS STUCK ── */
.stage-list{display:flex;flex-direction:column;gap:8px;}
.stage-item{display:flex;flex-direction:column;gap:4px;cursor:pointer;padding:8px 10px;border-radius:8px;transition:all 0.12s;border:1px solid transparent;}
.stage-item:hover{background:var(--bg3);border-color:var(--line);}
.stage-item.active{background:var(--goldbg);border-color:var(--goldbd);}
.stage-top{display:flex;justify-content:space-between;align-items:center;}
.stage-name{font-size:12.5px;font-weight:500;color:var(--ink2);}
.stage-meta{display:flex;align-items:center;gap:10px;}
.stage-val{font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;color:var(--gold);}
.stage-cnt{font-size:11px;color:var(--muted);}
.stage-track{background:var(--bg3);border-radius:3px;height:5px;overflow:hidden;}
.stage-fill{height:100%;border-radius:3px;transition:width 0.8s ease;}
.stage-hint{font-size:10px;color:var(--muted);margin-top:2px;display:none;}
.stage-item.active .stage-hint{display:block;color:var(--gold);}

/* ── WIN RATE RING ── */
.ring-wrap{display:flex;align-items:center;gap:22px;}
.rleg{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:8px;}
.rleg:last-child{margin-bottom:0;}
.rleg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rleg-lbl{color:var(--soft);flex:1;}
.rleg-v{font-family:'Geist Mono',monospace;font-size:12.5px;font-weight:500;color:var(--ink);}

/* ── MONTHLY BARS ── */
.month-chart{display:flex;align-items:flex-end;gap:6px;height:80px;padding-top:4px;}
.month-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.month-bars{display:flex;gap:2px;align-items:flex-end;flex:1;width:100%;}
.mbar{flex:1;border-radius:3px 3px 0 0;transition:height 0.8s ease;min-height:2px;cursor:pointer;}
.mbar:hover{opacity:0.8;}
.month-lbl{font-family:'Geist Mono',monospace;font-size:8.5px;color:var(--muted);letter-spacing:0.04em;}
.month-legend{display:flex;gap:14px;margin-top:10px;}
.ml-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.ml-dot{width:7px;height:7px;border-radius:2px;}

/* ── ACTION REQUIRED TABLE ── */
.action-table{width:100%;border-collapse:collapse;}
.action-table th{font-family:'Geist Mono',monospace;font-size:8.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:0 12px 10px;text-align:left;border-bottom:1px solid var(--line);}
.action-table td{padding:10px 12px;font-size:12.5px;border-bottom:1px solid var(--line);vertical-align:middle;}
.action-table tr:last-child td{border-bottom:none;}
.action-table tr:hover td{background:var(--bg3);}
.urgency{font-family:'Geist Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border-radius:10px;white-space:nowrap;}
.urgency.critical{color:var(--red);background:var(--redbg);border:1px solid var(--redbd);}
.urgency.high{color:var(--amb);background:var(--ambbg);border:1px solid var(--ambbd);}
.urgency.medium{color:var(--gold);background:var(--goldbg);border:1px solid var(--goldbd);}
.deal-name{font-weight:500;color:var(--ink);font-size:12.5px;}
.deal-org{font-size:11px;color:var(--muted);margin-top:1px;}
.deal-val{font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;}
.days-badge{font-family:'Geist Mono',monospace;font-size:11px;color:var(--soft);}

/* ── LOST DEALS ── */
.lost-table{width:100%;border-collapse:collapse;}
.lost-table th{font-family:'Geist Mono',monospace;font-size:8.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:0 12px 10px;text-align:left;border-bottom:1px solid var(--line);}
.lost-table td{padding:9px 12px;font-size:12px;color:var(--soft);border-bottom:1px solid var(--line);vertical-align:middle;}
.lost-table td:first-child{color:var(--ink);font-weight:500;}
.lost-table tr:last-child td{border-bottom:none;}
.lost-table tr:hover td{background:var(--bg3);}

/* ── DRILL PANEL ── */
.drill{display:none;background:var(--bg2);border:1.5px solid var(--goldbd);border-radius:12px;overflow:hidden;margin-bottom:24px;box-shadow:var(--sh2);animation:fu 0.22s ease both;}
.drill.open{display:block;}
.drill-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--goldbg);border-bottom:1px solid var(--goldbd);}
.drill-ttl{font-family:'Instrument Serif',serif;font-size:16px;color:var(--ink);}
.drill-cls{background:none;border:1px solid var(--goldbd);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--gold);cursor:pointer;font-family:'Geist',sans-serif;transition:all 0.12s;}
.drill-cls:hover{background:var(--gold);color:#fff;}
.drill-body{overflow-x:auto;}

/* ── LOADING / EMPTY ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 40px;text-align:center;}
.spinner{width:38px;height:38px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:18px;}
.loading-t{font-family:'Instrument Serif',serif;font-size:22px;color:var(--soft);margin-bottom:6px;}
.loading-s{font-size:12px;color:var(--muted);}
.no-data{text-align:center;padding:32px;color:var(--muted);font-size:13px;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes mi{from{opacity:0;transform:scale(0.975) translateY(5px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="logo"><div class="logo-i"></div></div>
    <div class="logo-text">
      <div class="logo-name">NEUROUX</div>
      <div class="logo-sub">Founder Intelligence</div>
    </div>
    <div class="hdr-div"></div>
    <div class="hdr-title">Revenue Dashboard</div>
  </div>
  <div class="hdr-r">
    <div class="hdr-ts" id="tsLabel"></div>
    <a href="index.html" class="btn btn-light" style="text-decoration:none;">← CRM</a>
    <button class="btn btn-dark" id="syncBtn" onclick="loadData()" style="min-width:auto;width:auto;">⟳ Sync</button>
    <button class="btn btn-light" onclick="openM('settingsM')">⚙</button>
  </div>
</div>

<div class="wrap" id="mainWrap">
  <div class="loading" id="loadState">
    <div class="spinner"></div>
    <div class="loading-t">Loading your revenue data…</div>
    <div class="loading-s">Connecting to HubSpot</div>
  </div>
  <div id="dash" style="display:none;"></div>
</div>

<!-- SETTINGS -->
<div class="mo" id="settingsM">
  <div class="md">
    <div class="md-h"><div class="md-t">Connect HubSpot</div><button class="mcls" onclick="closeM('settingsM')">✕</button></div>
    <div class="mb">
      <p style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;">Credentials stored in your browser only — never transmitted.</p>
      <div class="ff"><label>HubSpot API Token</label><input type="password" id="s_hs" placeholder="pat-na2-..."></div>
      <div class="ff"><label>Cloudflare Worker URL</label><input type="text" id="s_wk" placeholder="https://your-worker.workers.dev"></div>
      <div class="ff"><label>Anthropic API Key (for AI brief)</label><input type="password" id="s_ai" placeholder="sk-ant-..."></div>
      <div class="mfa"><button class="fcan" onclick="closeM('settingsM')">Cancel</button><button class="fpri" onclick="saveSettings()">Save & Sync</button></div>
    </div>
  </div>
</div>

<script>
const HS_STAGE_MAP={appointmentscheduled:'Call Scheduled',qualifiedtobuy:'Call Done',presentationscheduled:'Quote Sent',decisionmakerboughtin:'Negotiating',contractsent:'Contract Sent',closedwon:'Won',closedlost:'Lost'};
const STAGE_ORDER=['appointmentscheduled','qualifiedtobuy','presentationscheduled','decisionmakerboughtin','contractsent'];
const STAGE_COLORS=['#2050b8','#1848a8','#a87020','#a05808','#1a7248'];
const FOLLOWUP_DAYS={appointmentscheduled:0,qualifiedtobuy:3,presentationscheduled:3,decisionmakerboughtin:5,contractsent:5};

let allDeals=[], drillDeals=[], activeStage=null;

// ── INIT ──
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('tsLabel').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('s_hs').value=localStorage.getItem('nx_hs_tok')||'';
  document.getElementById('s_wk').value=localStorage.getItem('nx_wk_url')||'';
  document.getElementById('s_ai').value=localStorage.getItem('nx_ai_key')||'';
  const hs=localStorage.getItem('nx_hs_tok'),wk=localStorage.getItem('nx_wk_url');
  if(hs&&wk)loadData(); else{document.getElementById('loadState').style.display='none';openM('settingsM');}
});

// ── HUBSPOT ──
async function hsGet(path){
  const wk=localStorage.getItem('nx_wk_url')||'',tk=localStorage.getItem('nx_hs_tok')||'';
  const r=await fetch(wk+'/hubspot'+path,{headers:{'Authorization':'Bearer '+tk}});
  if(!r.ok)throw new Error('HubSpot error '+r.status);
  return r.json();
}

async function loadData(){
  const hs=localStorage.getItem('nx_hs_tok'),wk=localStorage.getItem('nx_wk_url');
  if(!hs||!wk){openM('settingsM');return;}
  document.getElementById('loadState').style.display='flex';
  document.getElementById('dash').style.display='none';
  const btn=document.getElementById('syncBtn');
  btn.classList.add('loading');btn.textContent='⟳ Syncing…';

  try{
    let deals=[],after='';
    do{
      const q='?limit=100&properties=dealname,amount,dealstage,closedate,createdate,hs_lastmodifieddate&associations=contacts'+(after?'&after='+after:'');
      const d=await hsGet('/crm/v3/objects/deals'+q);
      deals=deals.concat(d.results||[]);
      after=d.paging?.next?.after||'';
    }while(after);

    // Enrich top 60 with contact names
    for(const deal of deals.slice(0,60)){
      const ac=deal.associations?.contacts?.results||[];
      if(ac.length>0){
        try{
          const c=await hsGet('/crm/v3/objects/contacts/'+ac[0].id+'?properties=firstname,lastname,email,company');
          const cp=c.properties||{};
          deal._contact={name:((cp.firstname||'')+' '+(cp.lastname||'')).trim(),org:cp.company||'',email:cp.email||''};
        }catch(e){}
      }
    }

    allDeals=deals;
    renderDash(deals);
    document.getElementById('loadState').style.display='none';
    document.getElementById('dash').style.display='block';
    btn.classList.remove('loading');btn.textContent='⟳ Sync';

    // Generate AI brief after render
    generateBrief(deals);
  }catch(e){
    console.error(e);
    document.getElementById('loadState').innerHTML=`<div style="text-align:center;padding:60px;"><div style="font-size:28px;margin-bottom:14px;">⚠️</div><div style="font-family:'Instrument Serif',serif;font-size:20px;color:var(--soft);margin-bottom:8px;">Connection failed</div><div style="font-size:12px;color:var(--muted);margin-bottom:16px;">${e.message}</div><button onclick="openM('settingsM')" style="background:var(--gold);color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:13px;cursor:pointer;font-family:'Geist',sans-serif;font-weight:600;">Open Settings</button></div>`;
    btn.classList.remove('loading');btn.textContent='⟳ Sync';
  }
}

// ── AI BRIEF ──
async function generateBrief(deals){
  const key=localStorage.getItem('nx_ai_key'),wk=localStorage.getItem('nx_wk_url');
  if(!key||!wk)return;

  const won=deals.filter(d=>d.properties?.dealstage==='closedwon');
  const lost=deals.filter(d=>d.properties?.dealstage==='closedlost');
  const active=deals.filter(d=>d.properties?.dealstage!=='closedwon'&&d.properties?.dealstage!=='closedlost');
  const wonVal=won.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0);
  const lostVal=lost.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0);
  const pipeVal=active.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0);
  const winRate=won.length+lost.length>0?Math.round((won.length/(won.length+lost.length))*100):0;

  // Find most stuck stage
  let maxStageVal=0,maxStageName='';
  STAGE_ORDER.forEach(s=>{const v=active.filter(d=>d.properties?.dealstage===s).reduce((sum,d)=>sum+(parseFloat(d.properties?.amount)||0),0);if(v>maxStageVal){maxStageVal=v;maxStageName=HS_STAGE_MAP[s]||s;}});

  // Overdue count
  const today=new Date();
  const overdue=active.filter(d=>{
    const s=d.properties?.dealstage;const daysRule=FOLLOWUP_DAYS[s];if(daysRule===undefined)return false;
    const lm=d.properties?.hs_lastmodifieddate?new Date(d.properties.hs_lastmodifieddate):null;
    if(!lm)return false;
    return Math.floor((today-lm)/86400000)>daysRule;
  });

  // Last 30 days won
  const thirtyDaysAgo=new Date(today-30*86400000);
  const recentWon=won.filter(d=>d.properties?.closedate&&new Date(d.properties.closedate)>thirtyDaysAgo);
  const recentWonVal=recentWon.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0);

  const prompt=`You are a business intelligence analyst summarising NeuroUX's sales pipeline for the founders. Write a single paragraph of 3-4 sentences that reads like a confident analyst briefing. Be specific with numbers. No bullet points. No headers. No fluff.

Data:
- Win rate: ${winRate}%
- Revenue won (all time): $${wonVal.toLocaleString()} across ${won.length} deals
- Revenue won (last 30 days): $${recentWonVal.toLocaleString()} across ${recentWon.length} deals
- Revenue lost (all time): $${lostVal.toLocaleString()} across ${lost.length} deals
- Active pipeline: $${pipeVal.toLocaleString()} across ${active.length} deals
- Most stuck stage: ${maxStageName} ($${maxStageVal.toLocaleString()})
- Overdue follow-ups: ${overdue.length} deals worth $${overdue.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0).toLocaleString()}
- Total deals tracked: ${deals.length}

Write the paragraph now. Start directly with the insight, not with "NeuroUX" or "The company".`;

  try{
    const resp=await fetch(wk+'/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        apiKey:key,
        model:'claude-haiku-4-5-20251001',
        max_tokens:220,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await resp.json();
    const text=data.content?.[0]?.text||'';
    if(text){
      document.getElementById('briefText').textContent=text;
      document.getElementById('briefText').classList.remove('loading');
      document.getElementById('briefMeta').textContent='Generated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})+' · Powered by Claude';
    }
  }catch(e){
    document.getElementById('briefText').textContent='Could not generate brief. Check your Anthropic API key in Settings.';
  }
}

// ── RENDER ──
function renderDash(deals){
  const won=deals.filter(d=>d.properties?.dealstage==='closedwon');
  const lost=deals.filter(d=>d.properties?.dealstage==='closedlost');
  const active=deals.filter(d=>d.properties?.dealstage!=='closedwon'&&d.properties?.dealstage!=='closedlost');
  const wonVal=won.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0);
  const lostVal=lost.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0);
  const pipeVal=active.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0);
  const total=won.length+lost.length;
  const winRate=total>0?Math.round((won.length/total)*100):0;
  const circ=2*Math.PI*52;
  const wonArc=(winRate/100)*circ;

  // Avg deal size & close time
  const avgDeal=won.length>0?Math.round(wonVal/won.length):0;
  const closeTimes=won.filter(d=>d.properties?.createdate&&d.properties?.closedate).map(d=>Math.round((new Date(d.properties.closedate)-new Date(d.properties.createdate))/86400000)).filter(d=>d>0&&d<400);
  const avgClose=closeTimes.length?Math.round(closeTimes.reduce((a,b)=>a+b,0)/closeTimes.length):0;

  // Stage money map
  const stageData=STAGE_ORDER.map((s,i)=>{
    const sDeals=active.filter(d=>d.properties?.dealstage===s);
    const sVal=sDeals.reduce((sum,d)=>sum+(parseFloat(d.properties?.amount)||0),0);
    return{stage:s,name:HS_STAGE_MAP[s]||s,deals:sDeals,value:sVal,count:sDeals.length,color:STAGE_COLORS[i]};
  }).filter(s=>s.count>0);
  const maxStageVal=Math.max(...stageData.map(s=>s.value),1);

  // Overdue deals (action required)
  const today=new Date();
  const actionDeals=active.map(d=>{
    const s=d.properties?.dealstage;
    const rule=FOLLOWUP_DAYS[s];if(rule===undefined)return null;
    const lm=d.properties?.hs_lastmodifieddate?new Date(d.properties.hs_lastmodifieddate):null;
    if(!lm)return null;
    const daysOld=Math.floor((today-lm)/86400000);
    const daysOverdue=daysOld-rule;
    if(daysOverdue<0)return null;
    return{...d,_daysOverdue:daysOverdue,_daysOld:daysOld};
  }).filter(Boolean).sort((a,b)=>(parseFloat(b.properties?.amount)||0)-(parseFloat(a.properties?.amount)||0));

  // Monthly trend (6 months)
  const months=Array.from({length:6},(_,i)=>{const d=new Date(today.getFullYear(),today.getMonth()-5+i,1);return{label:d.toLocaleDateString('en-US',{month:'short'}),y:d.getFullYear(),m:d.getMonth()};});
  const mWon=months.map(m=>won.filter(d=>{if(!d.properties?.closedate)return false;const cd=new Date(d.properties.closedate);return cd.getMonth()===m.m&&cd.getFullYear()===m.y;}).reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0));
  const mLost=months.map(m=>lost.filter(d=>{if(!d.properties?.closedate)return false;const cd=new Date(d.properties.closedate);return cd.getMonth()===m.m&&cd.getFullYear()===m.y;}).reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0));
  const maxM=Math.max(...mWon,...mLost,1);

  // Top lost deals
  const topLost=lost.filter(d=>d.properties?.amount).sort((a,b)=>(parseFloat(b.properties?.amount)||0)-(parseFloat(a.properties?.amount)||0)).slice(0,10);

  // Recent wins
  const recentWon=won.filter(d=>d.properties?.closedate).sort((a,b)=>new Date(b.properties.closedate)-new Date(a.properties.closedate)).slice(0,6);

  // Insights
  let insightFilters = [];
  const insightCards = generateInsights(won, lost, active, winRate, wonVal, lostVal, pipeVal, avgClose, actionDeals, insightFilters);
  _insightFilters = insightFilters;

  const hasAI=!!localStorage.getItem('nx_ai_key');

  document.getElementById('dash').innerHTML=`

  <!-- AI BRIEF -->
  <div class="brief">
    <div class="brief-label"><span class="brief-dot"></span>${hasAI?'AI Founder Brief':'Revenue Summary'}<button class="brief-regen" onclick="generateBrief(allDeals)" ${!hasAI?'disabled title="Add Anthropic API key in Settings"':''}>↺ Regenerate</button></div>
    <div class="brief-text ${hasAI?'loading':''}" id="briefText">${hasAI?'Analysing your pipeline data…':'Add your Anthropic API key in Settings to get an AI-generated narrative brief each time you open this dashboard.'}</div>
    <div class="brief-meta" id="briefMeta">${hasAI?'':'Connect AI in Settings → Anthropic API Key'}</div>
  </div>

  <!-- INSIGHT CARDS -->
  <div class="insights" id="insightsGrid">${insightCards.map((ins,i)=>`<div class="insight ${ins.color}" onclick="drillInsight(${i})" id="ins_${i}"><div class="ins-icon">${ins.icon}</div><div><div class="ins-ttl">${ins.title}</div><div class="ins-txt">${ins.text}</div><div class="ins-hint">Click to see deals →</div></div></div>`).join('')}</div>

      <div class="rh-val">$${fmtK(wonVal)}</div>

      <div class="rh-rate">${winRate}% win rate</div>
    </div>
    <div class="rh-card pipe">

    </div>
  </div>

  <!-- SECONDARY STATS -->

              <td style="font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;color:var(--red);">$${val.toLocaleString()}</td>
              <td style="font-size:11px;color:var(--muted);">${HS_STAGE_MAP[p.dealstage]||'—'}</td>

          }).join('')}</tbody>

    ${deals.length} deals · synced ${new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})} · NeuroUX Founder Intelligence
  </div>`;
}

// ── INSIGHTS ──
function generateInsights(won, lost, active, winRate, wonVal, lostVal, pipeVal, avgClose, actionDeals, filters){
  const ins=[];

  // Win rate
  if(winRate>=60){ins.push({icon:'🏆',color:'grn',title:'Strong win rate at '+winRate+'%',text:'Closing more than half of all competed deals. Consistent follow-up timing is the key driver.'});filters.push({label:'All Closed Deals',deals:[...won,...lost]});}
  else if(winRate>=40){ins.push({icon:'📈',color:'amb',title:'Win rate of '+winRate+'% has room to grow',text:'Good progress, but faster follow-up within 3 days of quoting makes the biggest difference.'});filters.push({label:'All Closed Deals',deals:[...won,...lost]});}
  else{ins.push({icon:'⚠️',color:'red',title:'Win rate of '+winRate+'% needs attention',text:'More than half of competed deals are being lost. Review pricing and follow-up cadence urgently.'});filters.push({label:'All Closed Deals',deals:[...won,...lost]});}

  // Price band
  const bands=[{label:'< $1K',min:0,max:1000},{label:'$1K–$3K',min:1000,max:3000},{label:'$3K–$6K',min:3000,max:6000},{label:'$6K–$10K',min:6000,max:10000},{label:'> $10K',min:10000,max:Infinity}];
  const bestBand=bands.map(b=>{const bW=won.filter(d=>{const v=parseFloat(d.properties?.amount)||0;return v>=b.min&&v<b.max;}).length;const bL=lost.filter(d=>{const v=parseFloat(d.properties?.amount)||0;return v>=b.min&&v<b.max;}).length;const bT=bW+bL;return{...b,won:bW,lost:bL,total:bT,rate:bT>0?Math.round((bW/bT)*100):0};}).filter(b=>b.total>1).sort((a,b)=>b.rate-a.rate)[0];
  if(bestBand&&bestBand.rate>0){ins.push({icon:'💰',color:'gold',title:bestBand.label+' deals close at '+bestBand.rate+'%',text:'This is your pricing sweet spot. Anchor quotes in this range and only go outside it with strong justification.'});const bd=[...won,...lost].filter(d=>{const v=parseFloat(d.properties?.amount)||0;return v>=bestBand.min&&v<bestBand.max;});filters.push({label:'Deals in '+bestBand.label,deals:bd});}

  // Lost revenue
  if(lostVal>0){ins.push({icon:'🔴',color:'red',title:'$'+fmtK(lostVal)+' in revenue lost',text:lost.length+' deals went cold. A re-activation sequence targeting the last 90 days could recover several.'});filters.push({label:'Lost Deals',deals:lost.sort((a,b)=>(parseFloat(b.properties?.amount)||0)-(parseFloat(a.properties?.amount)||0))});}

  // Active pipeline
  if(pipeVal>0){ins.push({icon:'🚀',color:'grn',title:'$'+fmtK(pipeVal)+' in active pipeline',text:active.length+' deals in progress. Consistent follow-up over the next 2 weeks could significantly move this.'});filters.push({label:'Active Pipeline',deals:active.sort((a,b)=>(parseFloat(b.properties?.amount)||0)-(parseFloat(a.properties?.amount)||0))});}

  // Action required
  if(actionDeals.length>0){const atRisk=actionDeals.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0);ins.push({icon:'⚡',color:'amb',title:actionDeals.length+' deals need follow-up now',text:'$'+fmtK(atRisk)+' at risk from overdue follow-ups. These should be contacted this week without fail.'});filters.push({label:'Overdue Follow-ups',deals:actionDeals});}

  // Avg close time
  if(avgClose>0){ins.push({icon:'⏱',color:'blu',title:'Deals take avg '+avgClose+' days to close',text:avgClose<=30?'Excellent velocity — short sales cycles mean more throughput.':avgClose<=60?'Reasonable. Faster quotes after calls could shorten this.':'Consider urgency triggers — grant deadlines, study start dates — to accelerate decisions.'});filters.push({label:'Won Deals by Close Time',deals:won.filter(d=>d.properties?.createdate&&d.properties?.closedate).sort((a,b)=>Math.round((new Date(b.properties.closedate)-new Date(b.properties.createdate))/86400000)-Math.round((new Date(a.properties.closedate)-new Date(a.properties.createdate))/86400000))});}

  return ins.slice(0,6);
}

// ── INSIGHT DRILL DOWN ──
let _insightFilters=[];
function drillInsight(idx){
  const filter=_insightFilters[idx];if(!filter)return;
  document.querySelectorAll('.insight').forEach((el,i)=>el.classList.toggle('active-ins',i===idx));
  const deals=filter.deals;
  document.getElementById('drillTitle').textContent=filter.label+' — '+deals.length+' deal'+(deals.length!==1?'s':'');
  if(!deals.length){document.getElementById('drillBody').innerHTML='<div class="no-data">No deals match this insight.</div>';}
  else{document.getElementById('drillBody').innerHTML=`<table class="lost-table"><thead><tr><th>Contact</th><th>Organisation</th><th>Value</th><th>Stage</th><th>Last Activity</th></tr></thead><tbody>${deals.map(d=>{const p=d.properties||{},c=d._contact||{};const val=parseFloat(p.amount)||0;const lm=p.hs_lastmodifieddate?new Date(p.hs_lastmodifieddate):p.closedate?new Date(p.closedate):null;const today=new Date();const dAgo=lm?Math.floor((today-lm)/86400000):null;const lmStr=dAgo===0?'Today':dAgo===1?'Yesterday':dAgo!==null?dAgo+'d ago':'—';const stageName=HS_STAGE_MAP[p.dealstage]||'—';const valCol=p.dealstage==='closedwon'?'var(--grn)':p.dealstage==='closedlost'?'var(--red)':'var(--gold)';return`<tr><td><div style="font-weight:500;color:var(--ink);">${esc(c.name||p.dealname||'—')}</div></td><td>${esc(c.org||'—')}</td><td style="font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;color:${valCol};">$${val.toLocaleString()}</td><td style="font-size:11.5px;color:var(--soft);">${stageName}</td><td style="font-family:'Geist Mono',monospace;font-size:11px;color:${dAgo>5?'var(--red)':'var(--muted)'};">${lmStr}</td></tr>`;}).join('')}</tbody></table>`;}
  const wrap=document.getElementById('drillWrap');wrap.classList.add('open');
  setTimeout(()=>wrap.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function drillStage(stage){
  // Toggle
  if(activeStage===stage){closeDrill();return;}
  activeStage=stage;

  // Update visual
  document.querySelectorAll('.stage-item').forEach(el=>{
    el.classList.toggle('active',el.id==='stage_'+stage);
  });

  const deals=allDeals.filter(d=>d.properties?.dealstage===stage);
  const stageName=HS_STAGE_MAP[stage]||stage;
  const totalVal=deals.reduce((s,d)=>s+(parseFloat(d.properties?.amount)||0),0);

  document.getElementById('drillTitle').textContent=stageName+' — '+deals.length+' deal'+(deals.length!==1?'s':'')+' · $'+totalVal.toLocaleString();

  if(!deals.length){
    document.getElementById('drillBody').innerHTML='<div class="no-data">No deals in this stage.</div>';
  }else{
    document.getElementById('drillBody').innerHTML=`<table class="lost-table">
      <thead><tr><th>Contact</th><th>Organisation</th><th>Value</th><th>Last Activity</th></tr></thead>
      <tbody>${deals.sort((a,b)=>(parseFloat(b.properties?.amount)||0)-(parseFloat(a.properties?.amount)||0)).map(d=>{
        const p=d.properties||{},c=d._contact||{};
        const val=parseFloat(p.amount)||0;
        const lm=p.hs_lastmodifieddate?new Date(p.hs_lastmodifieddate):null;
        const today=new Date();
        const daysAgo=lm?Math.floor((today-lm)/86400000):null;
        const lmStr=daysAgo===0?'Today':daysAgo===1?'Yesterday':daysAgo!==null?daysAgo+'d ago':'—';
        return`<tr>
          <td><div style="font-weight:500;color:var(--ink);">${esc(c.name||p.dealname||'—')}</div></td>
          <td>${esc(c.org||'—')}</td>
          <td style="font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;color:var(--gold);">$${val.toLocaleString()}</td>
          <td style="font-family:'Geist Mono',monospace;font-size:11px;color:${daysAgo>5?'var(--red)':'var(--muted)'};">${lmStr}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }

  const wrap=document.getElementById('drillWrap');
  wrap.classList.add('open');
  setTimeout(()=>wrap.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function closeDrill(){
  activeStage=null;
  document.getElementById('drillWrap').classList.remove('open');
  document.querySelectorAll('.stage-item').forEach(el=>el.classList.remove('active'));
}

// ── SETTINGS ──
function saveSettings(){
  const hs=document.getElementById('s_hs').value.trim(),wk=document.getElementById('s_wk').value.trim(),ai=document.getElementById('s_ai').value.trim();
  if(!hs||!wk){alert('Fill in HubSpot token and Worker URL.');return;}
  localStorage.setItem('nx_hs_tok',hs);localStorage.setItem('nx_wk_url',wk);
  if(ai)localStorage.setItem('nx_ai_key',ai);
  closeM('settingsM');loadData();
}

// ── UTILS ──
function fmtK(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return Math.round(n/1000)+'K';return n.toLocaleString();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openM(id){document.getElementById(id)?.classList.add('open');}
function closeM(id){document.getElementById(id)?.classList.remove('open');}
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
</script>
